# Test Workflow Iterative Bugfix On Single Script

## Action

Follow the iterative-bugfix-on-single-script workflow:
1. Identify issue in script (e.g., security vulnerability).
2. Make a fix and commit changes to the script file.
3. Test the fix; if incomplete, make further adjustments.
4. Repeat commit(s) to the same script file until the issue is resolved.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: scripts/dev_server.js

